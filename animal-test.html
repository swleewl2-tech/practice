<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 강아지상? 고양이상? 🐶🐱</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #f97316;
            --secondary: #a855f7;
            --accent: #ec4899;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0d0d1a, #1a0d2e, #0d1a1a);
            --card-bg: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --text-primary: rgba(255,255,255,1);
            --text-muted: rgba(255,255,255,0.55);
            --text-faint: rgba(255,255,255,0.3);
            --btn-bg: rgba(255,255,255,0.08);
            --btn-border: rgba(255,255,255,0.15);
            --btn-color: rgba(255,255,255,0.7);
            --toggle-bg: rgba(255,255,255,0.1);
            --toggle-border: rgba(255,255,255,0.2);
            --shadow: 0 30px 80px rgba(0,0,0,0.5);
            --upload-border: rgba(255,255,255,0.2);
            --upload-bg: rgba(255,255,255,0.04);
            --upload-hover: rgba(255,255,255,0.08);
            --bar-bg: rgba(255,255,255,0.1);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #fff7ed, #fdf4ff, #ecfdf5);
            --card-bg: rgba(255,255,255,0.8);
            --card-border: rgba(249,115,22,0.15);
            --text-primary: #1a1a2e;
            --text-muted: #555577;
            --text-faint: #9999bb;
            --btn-bg: rgba(249,115,22,0.07);
            --btn-border: rgba(249,115,22,0.2);
            --btn-color: #c2410c;
            --toggle-bg: rgba(249,115,22,0.1);
            --toggle-border: rgba(249,115,22,0.25);
            --shadow: 0 30px 80px rgba(249,115,22,0.15);
            --upload-border: rgba(168,85,247,0.3);
            --upload-bg: rgba(168,85,247,0.04);
            --upload-hover: rgba(168,85,247,0.08);
            --bar-bg: rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 60px;
            overflow-x: hidden;
            transition: background 0.4s ease;
        }

        .bg-circles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-circles span {
            position: absolute;
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        [data-theme="dark"] .bg-circles span { opacity: 0.06; }
        [data-theme="light"] .bg-circles span { opacity: 0.1; }

        .bg-circles span:nth-child(1) { width: 500px; height: 500px; background: #f97316; top: -150px; left: -150px; animation-duration: 28s; }
        .bg-circles span:nth-child(2) { width: 350px; height: 350px; background: #a855f7; top: 40%; right: -100px; animation-duration: 20s; animation-delay: -7s; }
        .bg-circles span:nth-child(3) { width: 250px; height: 250px; background: #06b6d4; bottom: 15%; left: 5%; animation-duration: 24s; animation-delay: -12s; }
        .bg-circles span:nth-child(4) { width: 180px; height: 180px; background: #ec4899; top: 35%; left: 35%; animation-duration: 16s; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-50px) rotate(120deg); }
            66% { transform: translateY(25px) rotate(240deg); }
        }

        .theme-toggle {
            position: relative;
            z-index: 10;
            align-self: flex-end;
            margin-bottom: 16px;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            color: var(--btn-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
        }
        .theme-toggle:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249,115,22,0.4);
        }

        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 32px;
        }
        .header-emojis {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 900;
            line-height: 1.3;
        }
        [data-theme="dark"] .header h1 {
            background: linear-gradient(90deg, #fdba74, #e879f9, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="light"] .header h1 {
            background: linear-gradient(90deg, #ea580c, #9333ea, #0891b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 36px 32px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }

        /* 업로드 영역 */
        .upload-zone {
            border: 2px dashed var(--upload-border);
            border-radius: 20px;
            padding: 32px 20px;
            background: var(--upload-bg);
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 20px;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            background: var(--upload-hover);
            border-color: var(--secondary);
            transform: scale(1.01);
        }
        .upload-zone input[type="file"] {
            display: none;
        }
        .upload-zone .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }
        .upload-zone .upload-text {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.6;
        }
        .upload-zone .upload-hint {
            color: var(--text-faint);
            font-size: 0.75rem;
            margin-top: 6px;
        }

        /* 미리보기 이미지 */
        #preview-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            display: none;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        /* 웹캠 */
        #webcam-container {
            display: none;
            margin-bottom: 20px;
        }
        #webcam-container canvas {
            width: 100% !important;
            height: auto !important;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        /* 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #a855f7);
            color: white;
            box-shadow: 0 6px 24px rgba(249,115,22,0.45);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(249,115,22,0.6); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-color);
            backdrop-filter: blur(8px);
        }
        .btn-outline:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
        }
        .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-full {
            width: 100%;
            padding: 18px;
            font-size: 1.05rem;
        }

        /* 분석 중 로딩 */
        .analyzing {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 0;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(249,115,22,0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .analyzing p { color: var(--text-muted); font-size: 0.9rem; }

        /* 결과 영역 */
        .result-section {
            display: none;
        }

        .result-animal {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 8px;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .result-type {
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .result-type.dog {
            background: linear-gradient(90deg, #fb923c, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-type.cat {
            background: linear-gradient(90deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        /* 확률 바 */
        .prob-bars {
            margin-bottom: 24px;
        }
        .prob-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .prob-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 80px;
            text-align: left;
        }
        .prob-bar-wrap {
            flex: 1;
            height: 12px;
            background: var(--bar-bg);
            border-radius: 999px;
            overflow: hidden;
        }
        .prob-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
        }
        .prob-bar-fill.dog { background: linear-gradient(90deg, #fb923c, #f59e0b); }
        .prob-bar-fill.cat { background: linear-gradient(90deg, #c084fc, #60a5fa); }
        .prob-pct {
            font-size: 0.82rem;
            font-weight: 700;
            min-width: 40px;
            text-align: right;
            color: var(--text-muted);
        }

        /* 성격 설명 */
        .personality-card {
            border-radius: 18px;
            padding: 22px 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .personality-card.dog {
            background: linear-gradient(135deg, rgba(251,146,60,0.12), rgba(245,158,11,0.08));
            border: 1px solid rgba(251,146,60,0.25);
        }
        .personality-card.cat {
            background: linear-gradient(135deg, rgba(192,132,252,0.12), rgba(96,165,250,0.08));
            border: 1px solid rgba(192,132,252,0.25);
        }
        .personality-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 14px;
            opacity: 0.7;
        }
        .personality-title.dog { color: #fb923c; }
        .personality-title.cat { color: #c084fc; }

        .traits {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .trait-chip {
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .trait-chip.dog {
            background: rgba(251,146,60,0.15);
            border: 1px solid rgba(251,146,60,0.3);
            color: #fb923c;
        }
        .trait-chip.cat {
            background: rgba(192,132,252,0.15);
            border: 1px solid rgba(192,132,252,0.3);
            color: #c084fc;
        }

        .personality-desc {
            font-size: 0.88rem;
            line-height: 1.8;
            color: var(--text-muted);
        }

        /* 유명인 스타일 섹션 */
        .celeb-section {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            text-align: left;
        }
        .celeb-section.dog {
            background: rgba(251,146,60,0.06);
            border: 1px solid rgba(251,146,60,0.15);
        }
        .celeb-section.cat {
            background: rgba(192,132,252,0.06);
            border: 1px solid rgba(192,132,252,0.15);
        }
        .celeb-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            opacity: 0.6;
        }
        .celeb-title.dog { color: #fb923c; }
        .celeb-title.cat { color: #c084fc; }
        .celeb-names {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .celeb-badge {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        /* 다시 테스트 버튼 */
        .retry-area {
            margin-top: 4px;
        }

        /* 공유 버튼 */
        .share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-color);
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 10px;
            backdrop-filter: blur(8px);
        }
        .share-btn:hover {
            background: linear-gradient(135deg, #1da1f2, #0ea5e9);
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
        }
        .share-toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 0.88rem;
            font-weight: 700;
            z-index: 9999;
            backdrop-filter: blur(10px);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 컨페티 */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .confetti-piece {
            position: absolute;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* 모델 로딩 배너 */
        .loading-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(249,115,22,0.9);
            color: white;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            z-index: 9999;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.4s;
        }
        .loading-dot {
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            animation: dotPulse 1s infinite;
        }
        @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* 안내 섹션 */
        .tips-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            margin-top: 24px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px 28px;
            box-shadow: var(--shadow);
        }
        .tips-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-faint);
            margin-bottom: 14px;
        }
        .tips-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .tips-list li {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .tips-list li .tip-icon { flex-shrink: 0; }

        @media (max-width: 420px) {
            .card { padding: 28px 20px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="bg-circles">
    <span></span><span></span><span></span><span></span>
</div>

<div class="confetti-container" id="confetti"></div>
<div class="share-toast" id="share-toast">📋 링크가 복사됐어요!</div>

<!-- 상단 바 -->
<div style="position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;width:100%;max-width:520px;margin-bottom:16px;">
    <a href="index.html" style="background:var(--toggle-bg);border:1px solid var(--toggle-border);border-radius:999px;padding:8px 18px;font-size:0.85rem;font-family:'Noto Sans KR',sans-serif;text-decoration:none;color:var(--btn-color);backdrop-filter:blur(10px);font-weight:700;display:flex;align-items:center;gap:6px;transition:all 0.3s;" onmouseover="this.style.background='linear-gradient(135deg,#f97316,#a855f7)';this.style.color='white';this.style.borderColor='transparent';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='var(--toggle-bg)';this.style.color='var(--btn-color)';this.style.borderColor='var(--toggle-border)';this.style.transform='none'">🍽️ 오늘 뭐 먹지?</a>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" style="margin-bottom:0;">
        <span id="toggle-icon">☀️</span>
        <span id="toggle-label">라이트 모드</span>
    </button>
</div>

<div class="header">
    <div class="header-emojis">🐶🐱</div>
    <h1>나는 강아지상? 고양이상?</h1>
    <p>AI가 당신의 얼굴을 분석해 동물상을 알려드려요</p>
</div>

<!-- 메인 카드 -->
<div class="card" id="main-card">

    <!-- 업로드 영역 -->
    <div id="upload-section">
        <label class="upload-zone" id="upload-zone" for="file-input">
            <span class="upload-icon">📸</span>
            <div class="upload-text">
                <strong>사진을 업로드하거나 여기를 클릭하세요</strong>
            </div>
            <div class="upload-hint">JPG, PNG, WEBP · 얼굴이 잘 보이는 사진 권장</div>
            <input type="file" id="file-input" accept="image/*" capture="user">
        </label>

        <div class="btn-group">
            <button class="btn btn-outline" id="camera-btn" onclick="toggleCamera()">
                📷 카메라 켜기
            </button>
            <button class="btn btn-outline" id="snap-btn" onclick="snapPhoto()" style="display:none">
                🤳 촬영하기
            </button>
        </div>

        <div id="webcam-container"></div>
        <img id="preview-img" alt="미리보기">

        <button class="btn btn-primary btn-full" id="analyze-btn" onclick="analyze()" disabled>
            🔍 동물상 분석하기
        </button>
    </div>

    <!-- 분석 중 -->
    <div class="analyzing" id="analyzing-section">
        <div class="spinner"></div>
        <p>AI가 열심히 분석 중이에요... 🤔</p>
    </div>

    <!-- 결과 -->
    <div class="result-section" id="result-section">
        <div class="result-animal" id="result-emoji"></div>
        <div class="result-type" id="result-type"></div>
        <div class="result-subtitle" id="result-subtitle"></div>

        <div class="prob-bars" id="prob-bars"></div>

        <div class="personality-card" id="personality-card">
            <div class="personality-title" id="personality-title">✦ 성격 분석</div>
            <div class="traits" id="traits"></div>
            <div class="personality-desc" id="personality-desc"></div>
        </div>

        <div class="celeb-section" id="celeb-section">
            <div class="celeb-title" id="celeb-title">✦ 비슷한 동물상 연예인</div>
            <div class="celeb-names" id="celeb-names"></div>
        </div>

        <div class="retry-area">
            <button class="btn btn-primary btn-full" onclick="reset()">
                🔄 다시 테스트하기
            </button>
            <button class="share-btn" onclick="shareResult()">
                🔗 결과 공유하기
            </button>
        </div>
    </div>

</div>

<!-- 팁 -->
<div class="tips-card">
    <div class="tips-title">✦ 정확한 결과를 위한 팁</div>
    <ul class="tips-list">
        <li><span class="tip-icon">🌟</span><span>밝은 곳에서 찍은 정면 얼굴 사진을 사용하면 더 정확해요</span></li>
        <li><span class="tip-icon">😊</span><span>마스크나 선글라스 없이 얼굴이 잘 보이는 사진을 선택하세요</span></li>
        <li><span class="tip-icon">🤳</span><span>카메라 버튼으로 실시간 촬영도 가능해요</span></li>
        <li><span class="tip-icon">🤖</span><span>Google Teachable Machine AI 모델로 분석해요</span></li>
    </ul>
</div>

<!-- 모델 로딩 배너 -->
<div class="loading-banner" id="loading-banner">
    <div class="loading-dot"></div>
    AI 모델 로딩 중...
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/H2JfC9sAi/";

let model = null;
let webcam = null;
let isWebcamOn = false;
let hasImage = false;
let isDark = true;

const ANIMAL_DATA = {
    dog: {
        emoji: "🐶",
        type: "강아지상",
        subtitle: "당신은 친근하고 따뜻한 매력의 소유자!",
        traits: ["활발함", "사교적", "충성스러움", "따뜻함", "솔직함", "긍정적"],
        desc: "강아지상인 당신은 주변 사람들에게 항상 따뜻함과 에너지를 나눠주는 타입이에요. 처음 보는 사람과도 금방 친해지고, 한 번 친해지면 끝까지 곁을 지키는 의리파! 가끔은 너무 솔직해서 실수할 때도 있지만, 그 순수함이 오히려 사람들의 마음을 사로잡는 매력이에요. 활발하고 에너지 넘치는 당신 덕분에 주변 분위기가 늘 밝아진답니다. ☀️",
        celebs: ["아이유", "강소라", "정해인", "박서준", "BTS 뷔", "박보검"],
        barColor: "dog"
    },
    cat: {
        emoji: "🐱",
        type: "고양이상",
        subtitle: "당신은 신비롭고 매혹적인 매력의 소유자!",
        traits: ["독립적", "신비로움", "섬세함", "개성 있는", "차분함", "우아함"],
        desc: "고양이상인 당신은 처음에는 약간 차갑고 도도해 보일 수 있지만, 알면 알수록 깊은 매력이 넘치는 타입이에요. 자기만의 세계가 확실하고 독립적인 성격으로, 군중 속에서도 자신만의 분위기를 풍긴답니다. 겉은 쿨해 보여도 내면은 따뜻하고 섬세한 감수성을 가지고 있어요. 혼자만의 시간을 소중히 여기며, 한번 마음을 열면 정말 깊은 유대감을 나누는 사람이에요. 🌙",
        celebs: ["손예진", "김태리", "공유", "현빈", "블랙핑크 제니", "차은우"],
        barColor: "cat"
    }
};

// 테마 초기화
(function initTheme() {
    const saved = localStorage.getItem('animal-theme');
    if (saved === 'light') {
        isDark = false;
        applyTheme(false);
    }
})();

// 모델 로드
async function loadModel() {
    try {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        document.getElementById('loading-banner').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-banner').style.display = 'none', 400);
    } catch (e) {
        document.getElementById('loading-banner').textContent = '⚠️ 모델 로드 실패. 새로고침해 주세요.';
    }
}
loadModel();

// 파일 업로드
document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    stopCamera();
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = document.getElementById('preview-img');
        img.src = ev.target.result;
        img.style.display = 'block';
        hasImage = true;
        updateAnalyzeBtn();
    };
    reader.readAsDataURL(file);
});

// 드래그 앤 드롭
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            stopCamera();
            const img = document.getElementById('preview-img');
            img.src = ev.target.result;
            img.style.display = 'block';
            hasImage = true;
            updateAnalyzeBtn();
        };
        reader.readAsDataURL(file);
    }
});

async function toggleCamera() {
    if (isWebcamOn) {
        stopCamera();
    } else {
        await startCamera();
    }
}

async function startCamera() {
    try {
        webcam = new tmImage.Webcam(400, 400, true);
        await webcam.setup();
        await webcam.play();
        isWebcamOn = true;

        const container = document.getElementById('webcam-container');
        container.innerHTML = '';
        container.appendChild(webcam.canvas);
        container.style.display = 'block';

        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('camera-btn').textContent = '📷 카메라 끄기';
        document.getElementById('snap-btn').style.display = '';
        hasImage = true;
        updateAnalyzeBtn();

        function loop() {
            if (isWebcamOn) {
                webcam.update();
                requestAnimationFrame(loop);
            }
        }
        loop();
    } catch (e) {
        alert('카메라 접근 권한이 필요해요.\n브라우저 설정에서 카메라를 허용해주세요.');
    }
}

function stopCamera() {
    if (webcam) {
        webcam.stop();
        webcam = null;
    }
    isWebcamOn = false;
    document.getElementById('webcam-container').style.display = 'none';
    document.getElementById('webcam-container').innerHTML = '';
    document.getElementById('camera-btn').textContent = '📷 카메라 켜기';
    document.getElementById('snap-btn').style.display = 'none';
}

function snapPhoto() {
    if (!webcam) return;
    const canvas = document.createElement('canvas');
    canvas.width = webcam.canvas.width;
    canvas.height = webcam.canvas.height;
    canvas.getContext('2d').drawImage(webcam.canvas, 0, 0);
    const img = document.getElementById('preview-img');
    img.src = canvas.toDataURL('image/png');
    img.style.display = 'block';
    stopCamera();
    hasImage = true;
    updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
    document.getElementById('analyze-btn').disabled = !(hasImage && model);
}

async function analyze() {
    if (!model) { alert('AI 모델이 아직 로딩 중이에요. 잠시 후 다시 시도해주세요.'); return; }

    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('analyzing-section').style.display = 'flex';

    await new Promise(r => setTimeout(r, 800));

    let predictions;
    try {
        const imgEl = document.getElementById('preview-img');
        predictions = await model.predict(imgEl);
    } catch (e) {
        alert('분석 중 오류가 발생했어요. 다시 시도해주세요.');
        reset();
        return;
    }

    document.getElementById('analyzing-section').style.display = 'none';
    showResult(predictions);
}

function showResult(predictions) {
    // class 이름 매핑 (모델 클래스 이름에 따라 dog/cat 판별)
    let dogProb = 0, catProb = 0;
    predictions.forEach(p => {
        const name = p.className.toLowerCase();
        if (name.includes('dog') || name.includes('강아지')) dogProb = p.probability;
        else if (name.includes('cat') || name.includes('고양이')) catProb = p.probability;
        else {
            // 순서 기반 fallback (첫 번째 클래스 = dog, 두 번째 = cat)
            if (predictions.indexOf(p) === 0) dogProb = p.probability;
            else catProb = p.probability;
        }
    });

    // 확률 정규화
    const total = dogProb + catProb;
    if (total > 0) { dogProb /= total; catProb /= total; }

    const isDog = dogProb >= catProb;
    const winnerKey = isDog ? 'dog' : 'cat';
    const data = ANIMAL_DATA[winnerKey];
    const winProb = Math.round((isDog ? dogProb : catProb) * 100);

    // 결과 채우기
    document.getElementById('result-emoji').textContent = data.emoji;

    const typeEl = document.getElementById('result-type');
    typeEl.textContent = data.type;
    typeEl.className = `result-type ${winnerKey}`;

    document.getElementById('result-subtitle').textContent = data.subtitle;

    // 확률 바
    const barsHtml = `
        <div class="prob-item">
            <div class="prob-label">🐶 강아지상</div>
            <div class="prob-bar-wrap"><div class="prob-bar-fill dog" id="bar-dog"></div></div>
            <div class="prob-pct">${Math.round(dogProb * 100)}%</div>
        </div>
        <div class="prob-item">
            <div class="prob-label">🐱 고양이상</div>
            <div class="prob-bar-wrap"><div class="prob-bar-fill cat" id="bar-cat"></div></div>
            <div class="prob-pct">${Math.round(catProb * 100)}%</div>
        </div>
    `;
    document.getElementById('prob-bars').innerHTML = barsHtml;
    setTimeout(() => {
        document.getElementById('bar-dog').style.width = `${Math.round(dogProb * 100)}%`;
        document.getElementById('bar-cat').style.width = `${Math.round(catProb * 100)}%`;
    }, 100);

    // 성격 카드
    const pcEl = document.getElementById('personality-card');
    pcEl.className = `personality-card ${winnerKey}`;
    document.getElementById('personality-title').className = `personality-title ${winnerKey}`;
    document.getElementById('personality-desc').textContent = data.desc;
    document.getElementById('traits').innerHTML = data.traits
        .map(t => `<span class="trait-chip ${winnerKey}">${t}</span>`).join('');

    // 연예인 섹션
    const cEl = document.getElementById('celeb-section');
    cEl.className = `celeb-section ${winnerKey}`;
    document.getElementById('celeb-title').className = `celeb-title ${winnerKey}`;
    document.getElementById('celeb-names').innerHTML = data.celebs
        .map(c => `<span class="celeb-badge">${c}</span>`).join('');

    document.getElementById('result-section').style.display = 'block';
    fireConfetti(winnerKey);

    // 결과 메모리
    localStorage.setItem('last-result', JSON.stringify({ type: winnerKey, dogProb: Math.round(dogProb*100), catProb: Math.round(catProb*100) }));
}

function reset() {
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('analyzing-section').style.display = 'none';
    document.getElementById('upload-section').style.display = 'block';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('preview-img').src = '';
    document.getElementById('file-input').value = '';
    document.getElementById('analyze-btn').disabled = true;
    hasImage = false;
    stopCamera();
}

function shareResult() {
    const last = JSON.parse(localStorage.getItem('last-result') || '{}');
    const type = last.type === 'dog' ? '강아지상' : '고양이상';
    const text = `나는 ${type}! (강아지 ${last.dogProb}% / 고양이 ${last.catProb}%) - AI 동물상 테스트`;
    const shareData = { title: '동물상 테스트', text, url: window.location.href };
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
        navigator.share(shareData).catch(() => {});
    } else {
        navigator.clipboard.writeText(`${text}\n${window.location.href}`).then(() => {
            const toast = document.getElementById('share-toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }).catch(() => alert(`${text}\n${window.location.href}`));
    }
}

function fireConfetti(type) {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = type === 'dog'
        ? ['#fb923c','#f59e0b','#fcd34d','#fed7aa','#ffffff']
        : ['#c084fc','#818cf8','#60a5fa','#e879f9','#ffffff'];
    for (let i = 0; i < 70; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
            left: ${Math.random() * 100}vw;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            width: ${Math.random() * 10 + 6}px;
            height: ${Math.random() * 10 + 6}px;
            border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
            animation-duration: ${Math.random() * 2.5 + 1.5}s;
            animation-delay: ${Math.random() * 0.6}s;
        `;
        container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 4000);
}

function toggleTheme() {
    isDark = !isDark;
    applyTheme(isDark);
    localStorage.setItem('animal-theme', isDark ? 'dark' : 'light');
}

function applyTheme(dark) {
    const html = document.documentElement;
    if (dark) {
        html.setAttribute('data-theme', 'dark');
        document.getElementById('toggle-icon').textContent = '☀️';
        document.getElementById('toggle-label').textContent = '라이트 모드';
    } else {
        html.setAttribute('data-theme', 'light');
        document.getElementById('toggle-icon').textContent = '🌙';
        document.getElementById('toggle-label').textContent = '다크 모드';
    }
}

// 모델 로드 완료 시 버튼 활성화 체크
const origLoad = loadModel;
setInterval(() => { if (model && hasImage) updateAnalyzeBtn(); }, 500);
</script>
</body>
</html>
