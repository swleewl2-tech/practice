<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 오늘 뭐 먹지?</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #7c3aed;
            --secondary: #ec4899;
            --accent: #f59e0b;
        }

        /* ── 다크 모드 (기본) ── */
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --text-primary: rgba(255,255,255,1);
            --text-muted: rgba(255,255,255,0.55);
            --text-faint: rgba(255,255,255,0.3);
            --cat-btn-bg: rgba(255,255,255,0.08);
            --cat-btn-border: rgba(255,255,255,0.15);
            --cat-btn-color: rgba(255,255,255,0.7);
            --chip-bg: rgba(255,255,255,0.05);
            --chip-border: rgba(255,255,255,0.08);
            --chip-color: rgba(255,255,255,0.65);
            --grid-title-color: rgba(255,255,255,0.4);
            --placeholder-color: rgba(255,255,255,0.3);
            --result-cat-color: rgba(255,255,255,0.45);
            --toggle-bg: rgba(255,255,255,0.1);
            --toggle-border: rgba(255,255,255,0.2);
            --toggle-icon: '☀️';
            --shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        /* ── 라이트 모드 ── */
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e8e0ff, #fce4ec, #fff8e1);
            --card-bg: rgba(255,255,255,0.75);
            --card-border: rgba(124,58,237,0.15);
            --text-primary: #1a1a2e;
            --text-muted: #555577;
            --text-faint: #9999bb;
            --cat-btn-bg: rgba(124,58,237,0.07);
            --cat-btn-border: rgba(124,58,237,0.2);
            --cat-btn-color: #5a3a9a;
            --chip-bg: rgba(124,58,237,0.05);
            --chip-border: rgba(124,58,237,0.12);
            --chip-color: #5a3a9a;
            --grid-title-color: #9999bb;
            --placeholder-color: #bbbbdd;
            --result-cat-color: #8888aa;
            --toggle-bg: rgba(124,58,237,0.1);
            --toggle-border: rgba(124,58,237,0.25);
            --toggle-icon: '🌙';
            --shadow: 0 30px 80px rgba(124,58,237,0.15);
        }

        body {
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 16px 60px;
            overflow-x: hidden;
            transition: background 0.4s ease;
        }

        /* 배경 파티클 */
        .bg-circles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-circles span {
            position: absolute;
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        [data-theme="dark"] .bg-circles span { opacity: 0.08; }
        [data-theme="light"] .bg-circles span { opacity: 0.12; }

        .bg-circles span:nth-child(1) { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-circles span:nth-child(2) { width: 300px; height: 300px; background: #ec4899; top: 50%; right: -80px; animation-duration: 18s; animation-delay: -5s; }
        .bg-circles span:nth-child(3) { width: 200px; height: 200px; background: #06b6d4; bottom: 10%; left: 5%; animation-duration: 22s; animation-delay: -10s; }
        .bg-circles span:nth-child(4) { width: 150px; height: 150px; background: #f59e0b; top: 30%; left: 40%; animation-duration: 15s; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-40px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        /* 테마 토글 버튼 */
        .theme-toggle {
            position: relative;
            z-index: 10;
            align-self: flex-end;
            margin-bottom: 12px;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            color: var(--cat-btn-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
        }
        .theme-toggle:hover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        /* 헤더 */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            line-height: 1.2;
        }
        [data-theme="dark"] .header h1 {
            background: linear-gradient(90deg, #fff, #e0d7ff, #fbc2eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="light"] .header h1 {
            background: linear-gradient(90deg, #7c3aed, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        /* 카테고리 탭 */
        .categories {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
            max-width: 700px;
        }
        .cat-btn {
            background: var(--cat-btn-bg);
            border: 1px solid var(--cat-btn-border);
            color: var(--cat-btn-color);
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            font-family: 'Noto Sans KR', sans-serif;
        }
        .cat-btn:hover, .cat-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        /* 메인 카드 */
        .card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }

        /* 결과 표시 영역 */
        .result-area {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: relative;
        }

        .result-emoji {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 12px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
        }
        .result-name {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 900;
            background: linear-gradient(90deg, #fbc2eb, #a18cd1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .result-category {
            margin-top: 8px;
            font-size: 0.78rem;
            color: var(--result-cat-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .placeholder-text {
            color: var(--placeholder-color);
            font-size: 1rem;
            animation: pulse 2s infinite;
            -webkit-text-fill-color: var(--placeholder-color);
            background: none;
        }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        /* 슬롯 롤링 효과 */
        .rolling {
            animation: roll 0.08s infinite linear;
        }
        @keyframes roll {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-8px) scale(0.95); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .pop {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0.6) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* 버튼 */
        .pick-btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5);
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .pick-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .pick-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(124, 58, 237, 0.65); }
        .pick-btn:hover::before { opacity: 1; }
        .pick-btn:active { transform: translateY(0px); }
        .pick-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* 메뉴 그리드 */
        .menu-grid-section {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            margin-top: 28px;
        }
        .menu-grid-title {
            color: var(--grid-title-color);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 14px;
            transition: color 0.3s;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }
        .menu-chip {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 14px;
            padding: 10px 8px;
            text-align: center;
            color: var(--chip-color);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(6px);
        }
        .menu-chip:hover {
            background: rgba(124, 58, 237, 0.3);
            border-color: rgba(124, 58, 237, 0.6);
            color: white;
            transform: translateY(-2px);
        }
        .menu-chip.selected {
            background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(236,72,153,0.5));
            border-color: rgba(236,72,153,0.7);
            color: white;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .menu-chip .chip-emoji { font-size: 1.3rem; display: block; margin-bottom: 4px; }

        /* 제휴 문의 폼 */
        .inquiry-section {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            margin-top: 48px;
        }
        .inquiry-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .inquiry-title h2 {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .inquiry-title p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 6px;
            transition: color 0.3s;
        }
        .inquiry-form {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: var(--shadow);
            transition: background 0.4s, border-color 0.4s;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            background: var(--cat-btn-bg);
            border: 1px solid var(--cat-btn-border);
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 0.9rem;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-primary);
            outline: none;
            transition: all 0.25s;
            resize: none;
        }
        [data-theme="dark"] .form-group input,
        [data-theme="dark"] .form-group textarea,
        [data-theme="dark"] .form-group select {
            color: rgba(255,255,255,0.9);
        }
        [data-theme="dark"] .form-group input::placeholder,
        [data-theme="dark"] .form-group textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }
        [data-theme="light"] .form-group input::placeholder,
        [data-theme="light"] .form-group textarea::placeholder {
            color: rgba(90,58,154,0.35);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }
.submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            box-shadow: 0 6px 24px rgba(124,58,237,0.45);
            transition: all 0.25s;
            margin-top: 4px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(124,58,237,0.6); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .form-message {
            text-align: center;
            font-size: 0.88rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        .form-message.success {
            display: block;
            background: rgba(16,185,129,0.15);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .form-message.error {
            display: block;
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* 댓글 섹션 */
        .comments-section {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            margin-top: 48px;
        }
        .comments-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .comments-title h2 {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .comments-title p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 6px;
            transition: color 0.3s;
        }
        .comments-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: var(--shadow);
            transition: background 0.4s, border-color 0.4s;
        }
        [data-theme="dark"] #disqus_thread { color-scheme: dark; }

        /* 컨페티 */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="bg-circles">
    <span></span><span></span><span></span><span></span>
</div>

<div class="confetti-container" id="confetti"></div>

<!-- 테마 토글 -->
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
    <span id="toggle-icon">☀️</span>
    <span id="toggle-label">라이트 모드</span>
</button>

<div class="header">
    <h1>🍽️ 오늘 뭐 먹지?</h1>
    <p>메뉴 고르기 귀찮을 땐 우주에게 맡겨봐!</p>
</div>

<!-- 카테고리 탭 -->
<div class="categories" id="categories">
    <button class="cat-btn active" onclick="setCategory('all', this)">🍴 전체</button>
    <button class="cat-btn" onclick="setCategory('korean', this)">🇰🇷 한식</button>
    <button class="cat-btn" onclick="setCategory('chinese', this)">🥢 중식</button>
    <button class="cat-btn" onclick="setCategory('japanese', this)">🇯🇵 일식</button>
    <button class="cat-btn" onclick="setCategory('western', this)">🍕 양식</button>
    <button class="cat-btn" onclick="setCategory('snack', this)">🥟 분식</button>
    <button class="cat-btn" onclick="setCategory('asian', this)">🌏 아시안</button>
    <button class="cat-btn" onclick="setCategory('bbq', this)">🔥 구이·탕</button>
    <button class="cat-btn" onclick="setCategory('light', this)">🥗 간단식</button>
</div>

<!-- 메인 카드 -->
<div class="card">
    <div class="result-area">
        <div class="result-emoji" id="result-emoji" style="display:none"></div>
        <div class="result-name" id="result-name">
            <span class="placeholder-text">✨ 뭐 먹을지 골라줄게!</span>
        </div>
        <div class="result-category" id="result-cat"></div>
    </div>
    <button class="pick-btn" id="pick-btn" onclick="pickMenu()">🎲 랜덤 메뉴 뽑기!</button>
</div>

<!-- 메뉴 그리드 -->
<div class="menu-grid-section">
    <div class="menu-grid-title">▸ 현재 메뉴 목록</div>
    <div class="menu-grid" id="menu-grid"></div>
</div>

<!-- 제휴 문의 폼 -->
<div class="inquiry-section">
    <div class="inquiry-title">
        <h2>🤝 제휴 문의</h2>
        <p>광고, 제휴, 협업 등 문의사항을 남겨주세요</p>
    </div>
    <form class="inquiry-form" id="inquiry-form" action="https://formspree.io/f/xjgzqrjz" method="POST">
        <div class="form-group">
            <label for="name">이름 *</label>
            <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
            <label for="company">회사/소속</label>
            <input type="text" id="company" name="company" placeholder="(주)맛있는회사">
        </div>
        <div class="form-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" name="email" placeholder="hello@example.com" required>
        </div>
        <div class="form-group">
            <label for="type">문의 유형</label>
            <select id="type" name="type">
                <option value="광고">📢 광고 문의</option>
                <option value="제휴">🤝 제휴 제안</option>
                <option value="협업">💡 콘텐츠 협업</option>
                <option value="기타">📩 기타 문의</option>
            </select>
        </div>
        <div class="form-group">
            <label for="message">문의 내용 *</label>
            <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 자유롭게 작성해주세요." required></textarea>
        </div>
        <div class="form-message" id="form-message"></div>
        <button type="submit" class="submit-btn" id="submit-btn">✉️ 문의 보내기</button>
    </form>
</div>

<!-- 댓글 섹션 -->
<div class="comments-section">
    <div class="comments-title">
        <h2>💬 댓글</h2>
        <p>오늘 뭐 먹었는지 알려줘요!</p>
    </div>
    <div class="comments-box">
        <div id="disqus_thread"></div>
    </div>
</div>

<script>
    var disqus_config = function () {
        this.page.url = window.location.href;
        this.page.identifier = 'today-what-to-eat';
    };
    (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://woo-7.disqus.com/embed.js';

let currentCategory = 'all';
let isRolling = false;
let isDark = true;

// 저장된 테마 불러오기
(function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'light') {
        isDark = false;
        applyTheme(false);
    }
})();

function toggleTheme() {
    isDark = !isDark;
    applyTheme(isDark);
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function applyTheme(dark) {
    const html = document.documentElement;
    const icon = document.getElementById('toggle-icon');
    const label = document.getElementById('toggle-label');
    if (dark) {
        html.setAttribute('data-theme', 'dark');
        icon.textContent = '☀️';
        label.textContent = '라이트 모드';
    } else {
        html.setAttribute('data-theme', 'light');
        icon.textContent = '🌙';
        label.textContent = '다크 모드';
    }
}

function getAllMenus() {
    return Object.values(menuData).flatMap(cat => cat.items.map(item => ({...item, cat: cat.label})));
}

function getMenus() {
    if (currentCategory === 'all') return getAllMenus();
    const d = menuData[currentCategory];
    return d ? d.items.map(item => ({...item, cat: d.label})) : [];
}

function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
    document.getElementById('result-emoji').style.display = 'none';
    document.getElementById('result-name').innerHTML = '<span class="placeholder-text">✨ 뭐 먹을지 골라줄게!</span>';
    document.getElementById('result-cat').textContent = '';
}

function renderGrid(selectedName) {
    const menus = getMenus();
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = menus.map(m => `
        <div class="menu-chip ${m.name === selectedName ? 'selected' : ''}" onclick="pickSpecific('${m.name}')">
            <span class="chip-emoji">${m.emoji}</span>
            ${m.name}
        </div>
    `).join('');
}

function pickSpecific(name) {
    const menus = getMenus();
    const found = menus.find(m => m.name === name);
    if (found) showResult(found);
}

function showResult(menu) {
    const emojiEl = document.getElementById('result-emoji');
    const nameEl = document.getElementById('result-name');
    const catEl = document.getElementById('result-cat');

    emojiEl.style.display = 'block';
    emojiEl.textContent = menu.emoji;
    emojiEl.classList.remove('pop');
    void emojiEl.offsetWidth;
    emojiEl.classList.add('pop');

    nameEl.innerHTML = '';
    nameEl.style.backgroundImage = 'linear-gradient(90deg, #fbc2eb, #a18cd1)';
    nameEl.style['-webkit-background-clip'] = 'text';
    nameEl.style['-webkit-text-fill-color'] = 'transparent';
    nameEl.textContent = menu.name;

    catEl.textContent = `# ${menu.cat}`;
    renderGrid(menu.name);
    fireConfetti();
}

async function pickMenu() {
    if (isRolling) return;
    isRolling = true;
    const btn = document.getElementById('pick-btn');
    btn.disabled = true;
    btn.textContent = '🎰 고르는 중...';

    const menus = getMenus();
    const emojiEl = document.getElementById('result-emoji');
    const nameEl = document.getElementById('result-name');

    emojiEl.style.display = 'block';
    emojiEl.classList.remove('pop');

    let count = 0;
    const totalFrames = 20;
    await new Promise(resolve => {
        const interval = setInterval(() => {
            const rand = menus[Math.floor(Math.random() * menus.length)];
            emojiEl.textContent = rand.emoji;
            nameEl.textContent = rand.name;
            nameEl.style['-webkit-text-fill-color'] = 'rgba(255,255,255,0.5)';
            emojiEl.classList.toggle('rolling');
            count++;
            if (count >= totalFrames) {
                clearInterval(interval);
                resolve();
            }
        }, 80);
    });

    const final = menus[Math.floor(Math.random() * menus.length)];
    emojiEl.classList.remove('rolling');
    nameEl.style.backgroundImage = 'linear-gradient(90deg, #fbc2eb, #a18cd1)';
    nameEl.style['-webkit-background-clip'] = 'text';
    nameEl.style['-webkit-text-fill-color'] = 'transparent';
    showResult(final);

    btn.disabled = false;
    btn.textContent = '🎲 다시 뽑기!';
    isRolling = false;
}

function fireConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#7c3aed','#ec4899','#f59e0b','#06b6d4','#10b981','#ffffff'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
            left: ${Math.random() * 100}vw;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            width: ${Math.random() * 10 + 5}px;
            height: ${Math.random() * 10 + 5}px;
            border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
            animation-duration: ${Math.random() * 2 + 1.5}s;
            animation-delay: ${Math.random() * 0.5}s;
        `;
        container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 3500);
}

renderGrid();

// 제휴 문의 폼 비동기 제출
document.getElementById('inquiry-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('form-message');
    btn.disabled = true;
    btn.textContent = '📨 전송 중...';
    msg.className = 'form-message';

    try {
        const res = await fetch(this.action, {
            method: 'POST',
            body: new FormData(this),
            headers: { Accept: 'application/json' }
        });
        if (res.ok) {
            msg.className = 'form-message success';
            msg.textContent = '✅ 문의가 접수됐어요! 빠르게 연락드릴게요.';
            this.reset();
            btn.textContent = '✉️ 문의 보내기';
        } else {
            throw new Error();
        }
    } catch {
        msg.className = 'form-message error';
        msg.textContent = '❌ 전송에 실패했어요. 잠시 후 다시 시도해주세요.';
        btn.textContent = '✉️ 문의 보내기';
    }
    btn.disabled = false;
});
