<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #7c3aed;
            --secondary: #ec4899;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 16px 60px;
            overflow-x: hidden;
        }

        /* 배경 파티클 */
        .bg-circles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-circles span {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
            animation: float 20s infinite linear;
        }
        .bg-circles span:nth-child(1) { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-circles span:nth-child(2) { width: 300px; height: 300px; background: #ec4899; top: 50%; right: -80px; animation-duration: 18s; animation-delay: -5s; }
        .bg-circles span:nth-child(3) { width: 200px; height: 200px; background: #06b6d4; bottom: 10%; left: 5%; animation-duration: 22s; animation-delay: -10s; }
        .bg-circles span:nth-child(4) { width: 150px; height: 150px; background: #f59e0b; top: 30%; left: 40%; animation-duration: 15s; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-40px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        /* 헤더 */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #e0d7ff, #fbc2eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .header p {
            color: rgba(255,255,255,0.55);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 카테고리 탭 */
        .categories {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
            max-width: 700px;
        }
        .cat-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
            font-family: 'Noto Sans KR', sans-serif;
        }
        .cat-btn:hover, .cat-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        /* 메인 카드 */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        /* 결과 표시 영역 */
        .result-area {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: relative;
        }

        .result-emoji {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 12px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
        }
        .result-name {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 900;
            background: linear-gradient(90deg, #fbc2eb, #a18cd1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .result-category {
            margin-top: 8px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.3);
            font-size: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        /* 슬롯 롤링 효과 */
        .rolling {
            animation: roll 0.08s infinite linear;
        }
        @keyframes roll {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-8px) scale(0.95); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .pop {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0.6) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* 버튼 */
        .pick-btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5);
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .pick-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .pick-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(124, 58, 237, 0.65); }
        .pick-btn:hover::before { opacity: 1; }
        .pick-btn:active { transform: translateY(0px); }
        .pick-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* 메뉴 그리드 */
        .menu-grid-section {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            margin-top: 28px;
        }
        .menu-grid-title {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 14px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }
        .menu-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 10px 8px;
            text-align: center;
            color: rgba(255,255,255,0.65);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(6px);
        }
        .menu-chip:hover {
            background: rgba(124, 58, 237, 0.3);
            border-color: rgba(124, 58, 237, 0.6);
            color: white;
            transform: translateY(-2px);
        }
        .menu-chip.selected {
            background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(236,72,153,0.5));
            border-color: rgba(236,72,153,0.7);
            color: white;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .menu-chip .chip-emoji { font-size: 1.3rem; display: block; margin-bottom: 4px; }

        /* 컨페티 */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>

let currentCategory = 'all';
let isRolling = false;

function getAllMenus() {
    return Object.values(menuData).flatMap(cat => cat.items.map(item => ({...item, cat: cat.label})));
}

function getMenus() {
    if (currentCategory === 'all') return getAllMenus();
    const d = menuData[currentCategory];
    return d ? d.items.map(item => ({...item, cat: d.label})) : [];
}

function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
    // 결과 리셋
    document.getElementById('result-emoji').style.display = 'none';
    document.getElementById('result-name').innerHTML = '<span class="placeholder-text">✨ 뭐 먹을지 골라줄게!</span>';
    document.getElementById('result-cat').textContent = '';
}

function renderGrid(selectedName) {
    const menus = getMenus();
    const grid = document.getElementById('menu-grid');
    grid.innerHTML = menus.map(m => `
        <div class="menu-chip ${m.name === selectedName ? 'selected' : ''}" onclick="pickSpecific('${m.name}')">
            <span class="chip-emoji">${m.emoji}</span>
            ${m.name}
        </div>
    `).join('');
}

function pickSpecific(name) {
    const menus = getMenus();
    const found = menus.find(m => m.name === name);
    if (found) showResult(found);
}

function showResult(menu) {
    const emojiEl = document.getElementById('result-emoji');
    const nameEl = document.getElementById('result-name');
    const catEl = document.getElementById('result-cat');

    emojiEl.style.display = 'block';
    emojiEl.textContent = menu.emoji;
    emojiEl.classList.remove('pop');
    void emojiEl.offsetWidth;
    emojiEl.classList.add('pop');

    nameEl.innerHTML = '';
    nameEl.style.backgroundImage = 'linear-gradient(90deg, #fbc2eb, #a18cd1)';
    nameEl.style['-webkit-background-clip'] = 'text';
    nameEl.style['-webkit-text-fill-color'] = 'transparent';
    nameEl.textContent = menu.name;

    catEl.textContent = `# ${menu.cat}`;
    renderGrid(menu.name);
    fireConfetti();
}

async function pickMenu() {
    if (isRolling) return;
    isRolling = true;
    const btn = document.getElementById('pick-btn');
    btn.disabled = true;
    btn.textContent = '🎰 고르는 중...';

    const menus = getMenus();
    const emojiEl = document.getElementById('result-emoji');
    const nameEl = document.getElementById('result-name');

    emojiEl.style.display = 'block';
    emojiEl.classList.remove('pop');

    // 슬롯 롤링 애니메이션
    let count = 0;
    const totalFrames = 20;
    await new Promise(resolve => {
        const interval = setInterval(() => {
            const rand = menus[Math.floor(Math.random() * menus.length)];
            emojiEl.textContent = rand.emoji;
            nameEl.textContent = rand.name;
            nameEl.style['-webkit-text-fill-color'] = 'rgba(255,255,255,0.5)';
            emojiEl.classList.toggle('rolling');
            count++;
            if (count >= totalFrames) {
                clearInterval(interval);
                resolve();
            }
        }, 80);
    });

    // 최종 선택
    const final = menus[Math.floor(Math.random() * menus.length)];
    emojiEl.classList.remove('rolling');
    nameEl.style.backgroundImage = 'linear-gradient(90deg, #fbc2eb, #a18cd1)';
    nameEl.style['-webkit-background-clip'] = 'text';
    nameEl.style['-webkit-text-fill-color'] = 'transparent';
    showResult(final);

    btn.disabled = false;
    btn.textContent = '🎲 다시 뽑기!';
    isRolling = false;
}

function fireConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#7c3aed','#ec4899','#f59e0b','#06b6d4','#10b981','#ffffff'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
            left: ${Math.random() * 100}vw;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            width: ${Math.random() * 10 + 5}px;
            height: ${Math.random() * 10 + 5}px;
            border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
            animation-duration: ${Math.random() * 2 + 1.5}s;
            animation-delay: ${Math.random() * 0.5}s;
        `;
        container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 3500);
}

// 초기 렌더
renderGrid();
</script>
